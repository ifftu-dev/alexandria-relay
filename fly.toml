# Fly.io configuration for Alexandria relay node
app = "alexandria-relay"
primary_region = "bom"  # Mumbai — closest to India

[build]
  # Standalone crate — Dockerfile is in repo root
  dockerfile = "Dockerfile"

[env]
  RUST_LOG = "info"

# TCP port for libp2p
[[services]]
  internal_port = 4001
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true

  [[services.ports]]
    port = 4001
    handlers = []

# UDP port for QUIC
[[services]]
  internal_port = 4001
  protocol = "udp"
  auto_stop_machines = false
  auto_start_machines = true

  [[services.ports]]
    port = 4001
    handlers = []

# HTTP port for health checks and metrics
[[services]]
  internal_port = 9090
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true

  [[services.ports]]
    port = 9090
    handlers = ["http"]

[checks]
  [checks.health]
    port = 9090
    type = "http"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/health"

[[vm]]
  # 1 GB headroom for the bumped circuit/reservation limits + Kademlia
  # store + libp2p connection state. 256mb was hitting OOM territory
  # under load (see RelayBehaviour limits in src/main.rs).
  memory = "1024mb"
  cpus = 1
