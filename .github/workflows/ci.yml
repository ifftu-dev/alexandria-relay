name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --locked

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --locked -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
          components: rustfmt
      - run: cargo fmt --check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy ${{ matrix.region }}
    runs-on: ubuntu-latest
    needs: [check, clippy, fmt, test, docker]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - region: mumbai
            config: fly.toml
            fly_region: bom
          - region: frankfurt
            config: fly-eu.toml
            fly_region: fra
    concurrency:
      # Per-region lock so the two regions deploy in parallel but
      # never overlap with themselves.
      group: deploy-${{ matrix.region }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # The receipt store is a single-writer sqlite DB — exactly one
      # machine per region (regions provide the redundancy). Fly's
      # default of 2 machines also makes the volume mount unsatisfiable
      # (mounts need one volume per machine).
      - run: flyctl scale count 1 --yes --config ${{ matrix.config }} || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # The registry store mounts a volume; ensure one exists per region.
      # Best-effort: volume creation races registration and bom has had
      # zone-saturation quirks — log state, attempt create, and let the
      # deploy step be the real arbiter (it fails loudly if unmounted).
      - run: |
          echo "--- volumes before:"
          flyctl volumes list --config ${{ matrix.config }} || true
          if ! flyctl volumes list --config ${{ matrix.config }} --json | grep -q '"name": *"relay_data"'; then
            flyctl volumes create relay_data --region ${{ matrix.fly_region }} --size 1 --yes --config ${{ matrix.config }} || \
              echo "::warning::volume create failed — proceeding, deploy will verify"
            sleep 10  # registration race: give the API a beat before deploy
          fi
          echo "--- volumes after:"
          flyctl volumes list --config ${{ matrix.config }} || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - run: flyctl deploy --remote-only --config ${{ matrix.config }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
