# Fly.io configuration for Alexandria relay node (EU)
app = "alexandria-relay-eu"
primary_region = "fra"  # Frankfurt — Europe

[build]
  dockerfile = "Dockerfile"

[env]
  RUST_LOG = "info"

# TCP port for libp2p
[[services]]
  internal_port = 4001
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true

  [[services.ports]]
    port = 4001
    handlers = []

# UDP port for QUIC
[[services]]
  internal_port = 4001
  protocol = "udp"
  auto_stop_machines = false
  auto_start_machines = true

  [[services.ports]]
    port = 4001
    handlers = []

# HTTP port for health checks and metrics
[[services]]
  internal_port = 9090
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true

  [[services.ports]]
    port = 9090
    handlers = ["http"]

[checks]
  [checks.health]
    port = 9090
    type = "http"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/health"

[[vm]]
  memory = "256mb"
  cpus = 1
